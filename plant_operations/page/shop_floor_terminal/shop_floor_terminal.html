<div id="sft-app">
  <!-- ===== TOP BAR ===== -->
  <div class="sft-topbar">
    <div class="sft-topbar-left">
      <span class="sft-logo">MES</span>
      <select id="sft-machine-select" class="sft-select">
        <option value="">-- Select Machine --</option>
      </select>
      <span id="sft-machine-name" class="sft-machine-name"></span>
    </div>
    <div class="sft-topbar-right">
      <div class="sft-job-info">
        <span id="sft-job-label" class="sft-info-label">Job:</span>
        <span id="sft-job-value" class="sft-info-value">--</span>
      </div>
      <div class="sft-job-info">
        <span class="sft-info-label">Order:</span>
        <span id="sft-order-value" class="sft-info-value">--</span>
      </div>
      <div class="sft-job-info">
        <span class="sft-info-label">Operator:</span>
        <span id="sft-operator-value" class="sft-info-value">--</span>
      </div>
      <div id="sft-timer" class="sft-timer">00:00:00</div>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="sft-main">
    <!-- LEFT: Control Buttons -->
    <div class="sft-controls">
      <button id="sft-btn-start" class="sft-btn sft-btn-start" disabled>
        <i class="fa fa-play"></i> START
      </button>
      <button id="sft-btn-pause" class="sft-btn sft-btn-pause" disabled>
        <i class="fa fa-pause"></i> PAUSE
      </button>
      <button id="sft-btn-resume" class="sft-btn sft-btn-resume" disabled style="display:none">
        <i class="fa fa-play"></i> RESUME
      </button>
      <button id="sft-btn-stop" class="sft-btn sft-btn-stop" disabled>
        <i class="fa fa-stop"></i> STOP
      </button>
      <div class="sft-status-badge" id="sft-status-badge">IDLE</div>
    </div>

    <!-- CENTER: Big Number Displays -->
    <div class="sft-displays">
      <div class="sft-display-row">
        <div class="sft-display-card sft-good">
          <div class="sft-display-label">GOOD COUNT</div>
          <div class="sft-display-number" id="sft-good-count">0</div>
          <div class="sft-display-sub" id="sft-planned-count">/ 0 planned</div>
        </div>
        <div class="sft-display-card sft-waste">
          <div class="sft-display-label">WASTE</div>
          <div class="sft-display-number" id="sft-waste-count">0</div>
          <div class="sft-display-sub" id="sft-reject-count">Reject: 0</div>
        </div>
      </div>
      <div class="sft-display-row">
        <div class="sft-display-card sft-speed">
          <div class="sft-display-label">SPEED (pcs/hr)</div>
          <div class="sft-display-number" id="sft-speed-value">0</div>
          <div class="sft-display-sub" id="sft-rated-speed">Rated: --</div>
        </div>
        <div class="sft-display-card sft-oee-card">
          <div class="sft-display-label">OEE</div>
          <div class="sft-oee-gauge-wrap">
            <svg class="sft-oee-gauge" viewBox="0 0 120 120">
              <circle class="sft-gauge-bg" cx="60" cy="60" r="52" />
              <circle class="sft-gauge-fill" id="sft-gauge-fill" cx="60" cy="60" r="52" />
              <text class="sft-gauge-text" id="sft-gauge-text" x="60" y="65" text-anchor="middle">0%</text>
            </svg>
          </div>
          <div class="sft-oee-breakdown">
            <span>A: <b id="sft-avail-pct">0</b>%</span>
            <span>P: <b id="sft-perf-pct">0</b>%</span>
            <span>Q: <b id="sft-qual-pct">0</b>%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Numpad -->
    <div class="sft-numpad-section">
      <div class="sft-numpad-label">Enter Count</div>
      <div class="sft-numpad-target">
        <select id="sft-count-target" class="sft-select sft-select-sm">
          <option value="good">Good Qty</option>
          <option value="waste">Waste Qty</option>
          <option value="reject">Reject Qty</option>
        </select>
      </div>
      <div class="sft-numpad-display" id="sft-numpad-display">0</div>
      <div class="sft-numpad-grid">
        <button class="sft-numpad-btn" data-val="7">7</button>
        <button class="sft-numpad-btn" data-val="8">8</button>
        <button class="sft-numpad-btn" data-val="9">9</button>
        <button class="sft-numpad-btn" data-val="4">4</button>
        <button class="sft-numpad-btn" data-val="5">5</button>
        <button class="sft-numpad-btn" data-val="6">6</button>
        <button class="sft-numpad-btn" data-val="1">1</button>
        <button class="sft-numpad-btn" data-val="2">2</button>
        <button class="sft-numpad-btn" data-val="3">3</button>
        <button class="sft-numpad-btn sft-numpad-clear" data-val="C">C</button>
        <button class="sft-numpad-btn" data-val="0">0</button>
        <button class="sft-numpad-btn sft-numpad-enter" data-val="Enter">&#9166;</button>
      </div>
    </div>
  </div>

  <!-- ===== BOTTOM: Downtime Reason Buttons ===== -->
  <div class="sft-downtime-bar">
    <span class="sft-downtime-title">DOWNTIME:</span>
    <button class="sft-dt-btn sft-dt-mechanical" data-reason="Mechanical">
      <i class="fa fa-wrench"></i> Mechanical
    </button>
    <button class="sft-dt-btn sft-dt-electrical" data-reason="Electrical">
      <i class="fa fa-bolt"></i> Electrical
    </button>
    <button class="sft-dt-btn sft-dt-material" data-reason="Material">
      <i class="fa fa-cubes"></i> Material
    </button>
    <button class="sft-dt-btn sft-dt-setup" data-reason="Setup">
      <i class="fa fa-cogs"></i> Setup
    </button>
    <button class="sft-dt-btn sft-dt-changeover" data-reason="Changeover">
      <i class="fa fa-exchange"></i> Changeover
    </button>
    <button class="sft-dt-btn sft-dt-maintenance" data-reason="Planned Maintenance">
      <i class="fa fa-calendar-check-o"></i> PM
    </button>
    <button class="sft-dt-btn sft-dt-break" data-reason="Break">
      <i class="fa fa-coffee"></i> Break
    </button>
    <button class="sft-dt-btn sft-dt-other" data-reason="Other">
      <i class="fa fa-question-circle"></i> Other
    </button>
  </div>
</div>
